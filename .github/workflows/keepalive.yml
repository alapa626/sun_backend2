name: Keep Render Alive

on:
  schedule:
    - cron: '0 * * * *'    # every hour at :00
    - cron: '30 * * * *'   # every hour at :30
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          curl https://sun-backend2-2.onrender.com
          echo "Server pinged successfully!"
